name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            suffix: ""
            asset_name: git-summary-linux-amd64

          - goos: linux
            goarch: arm64
            suffix: ""
            asset_name: git-summary-linux-arm64

          # macOS
          - goos: darwin
            goarch: amd64
            suffix: ""
            asset_name: git-summary-darwin-amd64

          - goos: darwin
            goarch: arm64
            suffix: ""
            asset_name: git-summary-darwin-arm64

          # Windows
          - goos: windows
            goarch: amd64
            suffix: ".exe"
            asset_name: git-summary-windows-amd64.exe

          - goos: windows
            goarch: arm64
            suffix: ".exe"
            asset_name: git-summary-windows-arm64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags="-s -w -X github.com/mamatqurtifa/git-summary/cmd.version=${{ github.ref_name }}" \
            -o ${{ matrix.asset_name }} \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List built binaries
        run: ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Extract changelog for this tag
        id: changelog
        run: |
          # Try to extract notes for this version from CHANGELOG.md
          # Falls back to listing commits since last tag
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline "${PREV_TAG}..${TAG}" --no-merges | head -30)
          else
            COMMITS=$(git log --oneline -20 --no-merges)
          fi

          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "## What's changed in ${TAG}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "${COMMITS}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "## Installation" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "Download the binary for your platform below, make it executable, and move it to your PATH:" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo '```bash' >> $GITHUB_OUTPUT
          echo "# Linux / macOS" >> $GITHUB_OUTPUT
          echo 'chmod +x git-summary-*' >> $GITHUB_OUTPUT
          echo 'sudo mv git-summary-linux-amd64 /usr/local/bin/git-summary' >> $GITHUB_OUTPUT
          echo '```' >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo '```powershell' >> $GITHUB_OUTPUT
          echo "# Windows — move .exe to a folder in your PATH" >> $GITHUB_OUTPUT
          echo '```' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*
